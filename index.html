<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Project Hub</title>
    <style>
        body {
            font-family: sans-serif;
            background-color: #F9F9F9; /* Frost White from your design */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        h1 { color: #333333; }
        .container { display: flex; gap: 20px; }
        .card {
            padding: 20px;
            border: 2px solid #D4A373; /* Pastry Gold from your design */
            border-radius: 10px;
            text-decoration: none;
            color: #7B1E1E; /* Burgundy Red from your design */
            font-weight: bold;
            transition: 0.3s;
        }
        .card:hover {
            background-color: #7B1E1E;
            color: white;
        }
    </style>
</head>
<body>
    <h1>Welcome to My Projects</h1>
    <div class="container">
        <a href="./Mini Project/" class="card">View Mini Project</a>
        <a href="./eproject/" class="card">View E-Project</a>
    </div>
</body>
</html>
